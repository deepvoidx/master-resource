<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="robots" content="noindex,nofollow"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://api.github.com; img-src 'self' data:; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none';"/>
<title>Admin — Master Resource</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#07070e;--surf:#10101a;--card:#14141e;--bdr:#1c1c2c;
  --acc:#6c63ff;--txt:#e0e0f0;--mute:#7070a0;--danger:#e11d48;--ok:#10b981;
  --g-bdr:rgba(255,255,255,0.08);--g-shine:rgba(255,255,255,0.055);
  --blur:blur(20px) saturate(180%);
}
html,body{min-height:100vh;background:var(--bg);color:var(--txt);
  font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased;}
body{
  background-image:
    radial-gradient(ellipse 70% 55% at 15% 20%,rgba(108,99,255,.12) 0%,transparent 65%),
    radial-gradient(ellipse 55% 45% at 85% 75%,rgba(139,92,246,.08) 0%,transparent 60%);
}

/* ── utils ── */
.hidden{display:none!important;}
.flex{display:flex;} .gap8{gap:8px;} .gap12{gap:12px;} .gap16{gap:16px;}
.col{flex-direction:column;} .center{align-items:center;} .jc{justify-content:center;}
.ml-auto{margin-left:auto;}
.w100{width:100%;}

/* ── glass surface ── */
.glass{
  background:rgba(14,14,22,0.7);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--g-bdr);
  box-shadow:0 4px 24px rgba(0,0,0,.4),inset 0 1px 0 var(--g-shine);
}
@supports not (backdrop-filter:blur(1px)){.glass{background:rgba(14,14,22,.97);}}

/* ── typography ── */
h2{font-size:1.1rem;font-weight:700;color:#eeeef8;letter-spacing:-.01em;}
h3{font-size:.9rem;font-weight:600;color:#d0d0e8;}
label{font-size:.78rem;color:var(--mute);display:block;margin-bottom:4px;}
small{font-size:.72rem;color:var(--mute);}
a{color:var(--acc);text-decoration:none;}
a:hover{text-decoration:underline;}

/* ── inputs ── */
input,textarea,select{
  width:100%;background:rgba(255,255,255,.04);
  border:1px solid var(--g-bdr);color:var(--txt);
  padding:8px 12px;border-radius:9px;
  font-family:inherit;font-size:.85rem;outline:none;
  transition:border-color .18s,box-shadow .18s;
  -webkit-appearance:none;appearance:none;
  box-shadow:inset 0 1px 0 var(--g-shine);
}
input:focus,textarea:focus,select:focus{
  border-color:rgba(108,99,255,.52);
  box-shadow:0 0 0 3px rgba(108,99,255,.12),inset 0 1px 0 var(--g-shine);
}
input::placeholder,textarea::placeholder{color:#44446a;}
select option{background:#14141e;color:var(--txt);}
textarea{resize:vertical;min-height:70px;}

/* ── buttons ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:8px 16px;border-radius:9px;font-family:inherit;font-size:.82rem;
  font-weight:600;cursor:pointer;border:1px solid;transition:all .18s;
  -webkit-tap-highlight-color:transparent;white-space:nowrap;
}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.btn-primary{background:rgba(108,99,255,.22);border-color:rgba(108,99,255,.55);color:#d4d0ff;}
.btn-primary:hover:not(:disabled){background:rgba(108,99,255,.32);box-shadow:0 0 16px rgba(108,99,255,.2);}
.btn-danger{background:rgba(225,29,72,.12);border-color:rgba(225,29,72,.45);color:#fca5a5;}
.btn-danger:hover:not(:disabled){background:rgba(225,29,72,.22);}
.btn-ok{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.45);color:#6ee7b7;}
.btn-ok:hover:not(:disabled){background:rgba(16,185,129,.22);}
.btn-ghost{background:rgba(255,255,255,.04);border-color:var(--g-bdr);color:var(--mute);}
.btn-ghost:hover:not(:disabled){background:rgba(255,255,255,.08);color:#b0b0d8;}
.btn-sm{padding:5px 11px;font-size:.76rem;}
.btn-icon{padding:6px;width:32px;height:32px;border-radius:7px;}

/* ── badges ── */
.badge{display:inline-block;padding:2px 8px;border-radius:100px;font-size:.68rem;font-weight:700;letter-spacing:.4px;text-transform:uppercase;}
.badge-pending{background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.4);color:#fcd34d;}
.badge-ok{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.4);color:#6ee7b7;}
.badge-rejected{background:rgba(225,29,72,.12);border:1px solid rgba(225,29,72,.4);color:#fca5a5;}

/* ── toast ── */
#a-toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);
  background:rgba(12,12,22,.92);color:var(--txt);
  border:1px solid rgba(108,99,255,.3);border-radius:10px;
  padding:10px 20px;font-size:.84rem;pointer-events:none;opacity:0;
  transition:opacity .22s,transform .22s;z-index:1000;white-space:nowrap;
  display:flex;align-items:center;gap:8px;
  box-shadow:0 6px 28px rgba(0,0,0,.5);
}
#a-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── modal ── */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.65);
  backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);
  z-index:800;display:flex;align-items:center;justify-content:center;padding:16px;
}
.modal-box{
  width:min(520px,100%);max-height:90vh;overflow-y:auto;
  background:rgba(10,10,18,.92);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--g-bdr);border-radius:18px;padding:24px;
  box-shadow:0 24px 60px rgba(0,0,0,.6),inset 0 1px 0 var(--g-shine);
}
.modal-title{font-size:1rem;font-weight:700;color:#eeeef8;margin-bottom:16px;}
.modal-actions{display:flex;gap:8px;margin-top:18px;justify-content:flex-end;}

/* ── spinner ── */
.spinner{
  width:18px;height:18px;border:2px solid rgba(108,99,255,.3);
  border-top-color:var(--acc);border-radius:50%;
  animation:spin .7s linear infinite;flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ═══════════════════════════ LOGIN SCREEN ════════════════════ */
#login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
}
.login-card{
  width:min(380px,100%);border-radius:20px;padding:32px;
}
.login-logo{
  font-size:1.5rem;font-weight:800;color:#fff;
  font-family:'Syne','Trebuchet MS',system-ui,sans-serif;
  margin-bottom:4px;
}
.login-logo span{color:var(--acc);}
.login-sub{font-size:.8rem;color:var(--mute);margin-bottom:24px;}
.login-err{color:#f87171;font-size:.78rem;min-height:18px;margin-top:6px;}
.lockout-msg{
  background:rgba(225,29,72,.1);border:1px solid rgba(225,29,72,.35);
  border-radius:8px;padding:10px 14px;color:#fca5a5;font-size:.8rem;
  margin-bottom:14px;display:none;
}


/* ═══════════════════════════ ADMIN PANEL ════════════════════ */
#admin-panel{display:none;min-height:100vh;flex-direction:column;}

/* top bar */
.topbar{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;gap:12px;
  padding:12px var(--px,20px);
  background:rgba(6,6,12,.8);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border-bottom:1px solid var(--g-bdr);
}
.topbar-logo{
  font-size:.95rem;font-weight:800;color:#fff;
  font-family:'Syne','Trebuchet MS',system-ui,sans-serif;
}
.topbar-logo span{color:var(--acc);}
.topbar-sub{font-size:.72rem;color:var(--mute);}
.topbar-status{
  display:flex;align-items:center;gap:6px;font-size:.74rem;color:var(--mute);
  padding:4px 10px;border-radius:100px;
  background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);
  color:#6ee7b7;
}
.status-dot{width:6px;height:6px;border-radius:50%;background:#10b981;flex-shrink:0;}

/* tabs */
.tabs-bar{
  display:flex;gap:4px;padding:10px var(--px,20px) 0;
  border-bottom:1px solid var(--g-bdr);
  overflow-x:auto;scrollbar-width:none;
}
.tabs-bar::-webkit-scrollbar{display:none;}
.tab-btn{
  padding:8px 16px;border-radius:10px 10px 0 0;font-size:.82rem;font-weight:600;
  cursor:pointer;border:none;background:transparent;color:var(--mute);
  transition:color .15s,background .15s;white-space:nowrap;
  border:1px solid transparent;border-bottom:none;
  position:relative;bottom:-1px;
}
.tab-btn:hover{color:#b0b0d8;background:rgba(255,255,255,.04);}
.tab-btn.active{
  color:#d4d0ff;background:rgba(108,99,255,.12);
  border-color:var(--g-bdr);border-bottom-color:var(--bg);
}

/* content area */
.tab-content{display:none;padding:20px var(--px,20px) 40px;}
.tab-content.active{display:block;}

/* ── pending card ── */
.pend-card{
  border-radius:14px;padding:18px;margin-bottom:14px;
}
.pend-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:14px;}
.pend-name{font-size:.95rem;font-weight:700;color:#eeeef8;}
.pend-url{font-size:.76rem;color:#8a82ff;word-break:break-all;margin-top:2px;}
.pend-meta{font-size:.7rem;color:var(--mute);margin-top:3px;}
.pend-fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
@media(max-width:580px){.pend-fields{grid-template-columns:1fr;}}
.pend-cats{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0;}
.cat-check{
  display:flex;align-items:center;gap:5px;cursor:pointer;
  padding:4px 10px;border-radius:100px;font-size:.74rem;
  border:1px solid var(--g-bdr);color:var(--mute);
  transition:all .15s;background:rgba(255,255,255,.03);
  -webkit-tap-highlight-color:transparent;
}
.cat-check input{display:none;}
.cat-check.checked{
  background:rgba(108,99,255,.18);border-color:rgba(108,99,255,.52);color:#d4d0ff;
}

/* ── tool row ── */
.tool-row{
  border-radius:12px;padding:14px 16px;margin-bottom:8px;
  display:flex;align-items:center;gap:10px;cursor:pointer;
  transition:background .15s,border-color .15s;
}
.tool-row:hover{background:rgba(108,99,255,.06);border-color:rgba(108,99,255,.2)!important;}
.tool-row-name{font-size:.88rem;font-weight:600;color:#ddddf0;}
.tool-row-meta{font-size:.72rem;color:var(--mute);margin-top:1px;}
.tool-row-badge{
  margin-left:auto;padding:2px 8px;border-radius:100px;font-size:.68rem;
  background:rgba(255,255,255,.04);border:1px solid var(--g-bdr);color:var(--mute);
  white-space:nowrap;flex-shrink:0;
}

/* ── cat editor ── */
.cat-row{
  border-radius:12px;padding:12px 16px;margin-bottom:8px;
  display:flex;align-items:center;gap:10px;
}
.cat-icon-preview{
  width:34px;height:34px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-size:16px;flex-shrink:0;
}
.color-input{width:42px;height:32px;padding:2px;border-radius:7px;cursor:pointer;}

/* ── search bar inside admin ── */
.admin-search{position:relative;}
.admin-search svg{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  width:14px;height:14px;color:var(--mute);pointer-events:none;
}
.admin-search input{padding-left:34px;}

/* ── section header ── */
.sec-hdr{
  display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;
}
.sec-count{
  padding:2px 10px;border-radius:100px;font-size:.72rem;
  background:rgba(108,99,255,.1);border:1px solid rgba(108,99,255,.25);color:#a5a0ff;
}

/* ── empty state ── */
.empty-state{
  text-align:center;padding:48px 20px;color:var(--mute);
}
.empty-icon{font-size:2.4rem;margin-bottom:12px;}

/* responsive padding */
@media(max-width:600px){
  :root{--px:14px;}
  .pend-fields{grid-template-columns:1fr;}
  .modal-actions{flex-direction:column;}
}
</style>
</head>
<body>

<!-- ═══════════ LOGIN ═══════════ -->
<div id="login-screen">
  <div class="login-card glass">
    <div class="login-logo">Master <span>Resource</span></div>
    <div class="login-sub">Admin Panel</div>
    <div class="lockout-msg" id="lockout-msg"></div>
    <div style="margin-bottom:10px;">
      <label for="pat-input">Password</label>
      <input type="password" id="pat-input" placeholder="Enter password" autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="off"/>
      <div class="login-err" id="login-err"></div>
    </div>
    <button class="btn btn-primary w100" id="login-btn" style="margin-top:4px;">Sign In</button>
  </div>
</div>

<!-- ═══════════ ADMIN PANEL ═══════════ -->
<div id="admin-panel">
  <div class="topbar">
    <div>
      <div class="topbar-logo">Master <span>Resource</span> Admin</div>
      <div class="topbar-sub" id="gh-user"></div>
    </div>
    <div class="topbar-status ml-auto">
      <div class="status-dot"></div>Connected
    </div>
    <button class="btn btn-ghost btn-sm" id="refresh-btn" title="Reload data">↻ Refresh</button>
    <button class="btn btn-ghost btn-sm" id="logout-btn">Sign Out</button>
  </div>

  <div class="tabs-bar">
    <button class="tab-btn active" data-tab="pending">⏳ Pending <span id="pending-count" style="margin-left:3px;"></span></button>
    <button class="tab-btn" data-tab="tools">🛠 Tools Editor</button>
    <button class="tab-btn" data-tab="categories">🗂 Categories</button>
  </div>

  <!-- ── PENDING TAB ── -->
  <div class="tab-content active" id="tab-pending">
    <div id="pending-loading" class="flex center gap8" style="padding:40px;justify-content:center;">
      <div class="spinner"></div><span style="color:var(--mute);">Loading submissions…</span>
    </div>
    <div id="pending-list" class="hidden"></div>
    <div id="pending-empty" class="empty-state hidden">
      <div class="empty-icon">✓</div>
      <div>No pending submissions</div>
    </div>
  </div>

  <!-- ── TOOLS EDITOR TAB ── -->
  <div class="tab-content" id="tab-tools">
    <div class="sec-hdr">
      <h2>All Tools</h2>
      <span class="sec-count" id="tools-count">–</span>
      <button class="btn btn-primary btn-sm ml-auto" id="add-tool-btn">+ Add Tool</button>
    </div>
    <div class="admin-search" style="margin-bottom:14px;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="search" id="tools-search" placeholder="Search tools…"/>
    </div>
    <div id="tools-loading" class="flex center gap8" style="padding:40px;justify-content:center;">
      <div class="spinner"></div><span style="color:var(--mute);">Loading tools…</span>
    </div>
    <div id="tools-list" class="hidden"></div>
  </div>

  <!-- ── CATEGORIES TAB ── -->
  <div class="tab-content" id="tab-categories">
    <div class="sec-hdr">
      <h2>Categories</h2>
      <span class="sec-count" id="cats-count">–</span>
      <button class="btn btn-primary btn-sm ml-auto" id="add-cat-btn">+ Add Category</button>
    </div>
    <div id="cats-loading" class="flex center gap8" style="padding:40px;justify-content:center;">
      <div class="spinner"></div><span style="color:var(--mute);">Loading categories…</span>
    </div>
    <div id="cats-list" class="hidden"></div>
  </div>
</div>

<!-- ── tool edit modal ── -->
<div class="modal-bg hidden" id="tool-modal">
  <div class="modal-box">
    <div class="modal-title" id="tool-modal-title">Edit Tool</div>
    <div style="display:grid;gap:12px;">
      <div><label>Name *</label><input id="tm-name" type="text" maxlength="100" placeholder="Tool name"/></div>
      <div><label>URL *</label><input id="tm-url" type="url" maxlength="500" placeholder="https://example.com"/></div>
      <div><label>Description</label><input id="tm-desc" type="text" maxlength="200" placeholder="Short description of the tool"/></div>
      <div>
        <label>Categories (select one or more) *</label>
        <div id="tm-cats" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;"></div>
        <small style="color:#555580;margin-top:4px;display:block;">Tap multiple to add to several categories at once</small>
      </div>
      <div><label>Tags (comma separated, no #)</label><input id="tm-tags" type="text" placeholder="ai, free, creative"/></div>
      <div id="tm-err" style="color:#f87171;font-size:.78rem;min-height:16px;"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="tm-cancel">Cancel</button>
      <button class="btn btn-primary" id="tm-save">Save Tool</button>
    </div>
  </div>
</div>

<!-- ── category edit modal ── -->
<div class="modal-bg hidden" id="cat-modal">
  <div class="modal-box">
    <div class="modal-title" id="cat-modal-title">Edit Category</div>
    <div style="display:grid;gap:12px;">
      <div><label>ID (slug, no spaces) *</label><input id="cm-id" type="text" maxlength="40" placeholder="ai-assistants"/></div>
      <div><label>Label (full name) *</label><input id="cm-label" type="text" maxlength="60" placeholder="AI Assistants & Chatbots"/></div>
      <div><label>Short label (for filter button)</label><input id="cm-short" type="text" maxlength="20" placeholder="Assistants"/></div>
      <div><label>Icon (emoji)</label><input id="cm-icon" type="text" maxlength="4" placeholder="🤖"/></div>
      <div>
        <label>Colour</label>
        <div class="flex gap8 center" style="margin-top:4px;">
          <input id="cm-color" type="color" class="color-input" value="#6c63ff"/>
          <input id="cm-color-text" type="text" maxlength="7" placeholder="#6c63ff" style="flex:1;"/>
        </div>
      </div>
      <div id="cm-err" style="color:#f87171;font-size:.78rem;min-height:16px;"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="cm-cancel">Cancel</button>
      <button class="btn btn-primary" id="cm-save">Save Category</button>
    </div>
  </div>
</div>

<div id="a-toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
var GH = { owner:'deepvoidx', repo:'master-resource', branch:'main' };
var SESSION_MS   = 30 * 60 * 1000; // 30 min idle timeout
var MAX_ATTEMPTS = 3;
var LOCK_MS      = 5 * 60 * 1000;  // 5 min lockout

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
var S = {
  token:null, ghUser:'', activeTab:'pending',
  toolsData:null, toolsSha:null,
  pendingData:null, pendingSha:null,
  sessionTimer:null,
  editToolIdx:-1  // -1 = new tool
};

// ═══════════════════════════════════════════════════════
// SECURITY: rate-limit login attempts
// ═══════════════════════════════════════════════════════
function getLoginState() {
  try { return JSON.parse(sessionStorage.getItem('a_ls') || 'null'); } catch(e){return null;}
}
function setLoginState(s) { sessionStorage.setItem('a_ls', JSON.stringify(s)); }

function checkLockout() {
  var ls = getLoginState();
  if (!ls) return false;
  if (ls.locked && Date.now() < ls.lockedUntil) {
    var mins = Math.ceil((ls.lockedUntil - Date.now()) / 60000);
    document.getElementById('lockout-msg').style.display = 'block';
    document.getElementById('lockout-msg').textContent = 'Too many failed attempts. Try again in ' + mins + ' min.';
    document.getElementById('login-btn').disabled = true;
    return true;
  }
  if (ls.locked && Date.now() >= ls.lockedUntil) {
    sessionStorage.removeItem('a_ls');
    document.getElementById('lockout-msg').style.display = 'none';
    document.getElementById('login-btn').disabled = false;
  }
  return false;
}

function recordFailedAttempt() {
  var ls = getLoginState() || { attempts:0 };
  ls.attempts = (ls.attempts || 0) + 1;
  if (ls.attempts >= MAX_ATTEMPTS) {
    ls.locked = true; ls.lockedUntil = Date.now() + LOCK_MS;
  }
  setLoginState(ls);
  checkLockout();
}

function clearLoginState() { sessionStorage.removeItem('a_ls'); }

// ═══════════════════════════════════════════════════════
// SESSION
// ═══════════════════════════════════════════════════════
function startSession(token, user) {
  S.token = token; S.ghUser = user;
  sessionStorage.setItem('a_tok', token);
  sessionStorage.setItem('a_usr', user);
  resetIdleTimer();
}

function resetIdleTimer() {
  clearTimeout(S.sessionTimer);
  S.sessionTimer = setTimeout(function(){
    toast('Session expired. Please sign in again.', '⚠️');
    setTimeout(logout, 1500);
  }, SESSION_MS);
}

function logout() {
  S.token = null; S.toolsData = null; S.pendingData = null;
  sessionStorage.removeItem('a_tok');
  sessionStorage.removeItem('a_usr');
  clearTimeout(S.sessionTimer);
  document.getElementById('admin-panel').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pat-input').value = '';
}

// reset timer on any interaction

// ═══════════════════════════════════════════════════════
// GITHUB API
// ═══════════════════════════════════════════════════════
function apiHeaders() {
  return { 'Authorization':'Bearer '+S.token, 'Accept':'application/vnd.github.v3+json', 'Content-Type':'application/json' };
}

function apiGet(path) {
  return fetch('https://api.github.com/repos/'+GH.owner+'/'+GH.repo+'/contents/'+path+'?ref='+GH.branch, {
    headers: apiHeaders()
  }).then(function(r){
    if (!r.ok) return r.text().then(function(t){ throw new Error(r.status+': '+t); });
    return r.json().then(function(d){
      var raw = d.content.replace(/\n/g,'');
      var content;
      try { content = JSON.parse(decodeURIComponent(escape(atob(raw)))); }
      catch(e){ content = JSON.parse(atob(raw)); }
      return { content:content, sha:d.sha };
    });
  });
}

function apiPut(path, content, sha, message) {
  var str = JSON.stringify(content, null, 2);
  var encoded = btoa(unescape(encodeURIComponent(str)));
  var body = { message:message, content:encoded, branch:GH.branch };
  if (sha) body.sha = sha;
  return fetch('https://api.github.com/repos/'+GH.owner+'/'+GH.repo+'/contents/'+path, {
    method:'PUT', headers:apiHeaders(), body:JSON.stringify(body)
  }).then(function(r){
    if (!r.ok) return r.text().then(function(t){ throw new Error(r.status+': '+t); });
    return r.json();
  });
}

function validateGHToken(token) {
  return fetch('https://api.github.com/repos/'+GH.owner+'/'+GH.repo, {
    headers:{ 'Authorization':'Bearer '+token, 'Accept':'application/vnd.github.v3+json' }
  }).then(function(r){ return r.ok; });
}

function getGHUser(token) {
  return fetch('https://api.github.com/user', {
    headers:{ 'Authorization':'Bearer '+token, 'Accept':'application/vnd.github.v3+json' }
  }).then(function(r){ return r.ok ? r.json() : null; });
}

// ═══════════════════════════════════════════════════════
// SECURITY HELPERS
// ═══════════════════════════════════════════════════════
function esc(str) {
  return String(str||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// safeHref — validates protocol before using any URL in an href.
// esc() alone cannot stop javascript: because it has no HTML special chars.
function safeHref(raw) {
  var url = String(raw||'').trim().replace(/^[\s -­]+/,'');
  // Block every dangerous protocol including encoded variants
  if (!url || /^(javascript|data|vbscript|file|blob|about|ws|wss|\w+script):/i.test(url)) return '#blocked';
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  try {
    var p = new URL(url);
    return (['http:','https:'].includes(p.protocol)) ? p.href : '#blocked';
  } catch(e){ return '#blocked'; }
}

function sanitize(str, max) {
  return String(str||'').trim().slice(0, max||300).replace(/[\x00-\x1F\x7F]/g,'');
}

function validateURL(raw) {
  var url = String(raw||'').trim();
  if (!url) return { ok:false, msg:'URL required.' };
  if (/^(javascript|data|vbscript|file|blob|about):/i.test(url)) return { ok:false, msg:'Invalid URL protocol.' };
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  try {
    var p = new URL(url);
    if (!['http:','https:'].includes(p.protocol)) return { ok:false, msg:'Only http/https allowed.' };
    if (!p.hostname || !p.hostname.includes('.')) return { ok:false, msg:'Invalid hostname.' };
    return { ok:true, url:p.href };
  } catch(e){ return { ok:false, msg:'Invalid URL.' }; }
}

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
var toastT;
function toast(msg, icon) {
  var t = document.getElementById('a-toast');
  t.innerHTML = (icon?'<span>'+esc(icon)+'</span>':'') + '<span>'+esc(msg)+'</span>';
  t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

// ── PENDING TAB ──
// ═══════════════════════════════════════════════════════
function renderPending() {
  var list = document.getElementById('pending-list');
  var empty = document.getElementById('pending-empty');
  var loading = document.getElementById('pending-loading');
  loading.classList.add('hidden');

  var items = (S.pendingData && S.pendingData.pending) ? S.pendingData.pending : [];
  var pending = items.filter(function(i){ return i.status === 'pending'; });

  document.getElementById('pending-count').textContent = pending.length ? '('+pending.length+')' : '';

  if (!pending.length) {
    list.classList.add('hidden'); empty.classList.remove('hidden'); return;
  }
  empty.classList.add('hidden'); list.classList.remove('hidden');
  list.innerHTML = '';

  pending.forEach(function(item, idx) {
    var card = document.createElement('div');
    card.className = 'pend-card glass';
    var date = '';
    try { date = new Date(item.submittedAt).toLocaleDateString(); } catch(e){}

    // Build category checkboxes
    var cats = S.toolsData ? S.toolsData.categories : [];
    var catChecks = cats.map(function(c){
      return '<label class="cat-check" data-cid="'+esc(c.id)+'">' +
        '<input type="checkbox" value="'+esc(c.id)+'"/>'+esc(c.icon)+' '+esc(c.short||c.label)+
        '</label>';
    }).join('');

    card.innerHTML =
      '<div class="pend-header">' +
        '<div style="flex:1;">' +
          '<div class="pend-name">'+esc(item.name)+'</div>' +
          '<div class="pend-url"><a href="'+safeHref(item.url)+'" target="_blank" rel="noopener noreferrer">'+esc(item.url)+'</a></div>' +
          '<div class="pend-meta">Submitted: '+esc(date)+' &nbsp;·&nbsp; ID: '+esc(item.id)+'</div>' +
        '</div>' +
        '<span class="badge badge-pending">Pending</span>' +
      '</div>' +
      '<div class="pend-fields">' +
        '<div><label>Edit Name</label><input class="pf-name" type="text" value="'+esc(item.name)+'" maxlength="100"/></div>' +
        '<div><label>Edit URL</label><input class="pf-url" type="url" value="'+esc(item.url)+'" maxlength="500"/></div>' +
        '<div style="grid-column:1/-1"><label>Description</label><input class="pf-desc" type="text" maxlength="200" placeholder="Short description…"/></div>' +
        '<div style="grid-column:1/-1"><label>Tags (comma separated)</label><input class="pf-tags" type="text" placeholder="ai, free, creative"/></div>' +
      '</div>' +
      '<div><label>Categories</label><div class="pend-cats pf-cats">'+catChecks+'</div></div>' +
      '<div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;">' +
        '<button class="btn btn-ok btn-sm pf-approve">✓ Approve</button>' +
        '<button class="btn btn-danger btn-sm pf-reject">✗ Reject</button>' +
      '</div>' +
      '<div class="pf-err" style="color:#f87171;font-size:.76rem;margin-top:6px;min-height:14px;"></div>';

    list.appendChild(card);

    // Wire category checkboxes — multi-select
    card.querySelectorAll('.cat-check').forEach(function(lbl){
      lbl.addEventListener('click', function(e){
        // If user clicked the checkbox input itself, sync the label class
        if (e.target.tagName === 'INPUT') {
          lbl.classList.toggle('checked', e.target.checked);
          return;
        }
        // Otherwise toggle manually and keep input in sync
        e.preventDefault();
        var cb = lbl.querySelector('input');
        cb.checked = !cb.checked;
        lbl.classList.toggle('checked', cb.checked);
      });
    });

    // Approve
    card.querySelector('.pf-approve').addEventListener('click', function(){
      approvePending(item, card);
    });

    // Reject
    card.querySelector('.pf-reject').addEventListener('click', function(){
      if (!confirm('Reject and remove this submission?')) return;
      rejectPending(item, card);
    });
  });
}

function approvePending(item, card) {
  var nameVal = sanitize(card.querySelector('.pf-name').value, 100);
  var rawUrl  = card.querySelector('.pf-url').value;
  var desc    = sanitize(card.querySelector('.pf-desc').value, 200);
  var tagsRaw = card.querySelector('.pf-tags').value;
  var errEl   = card.querySelector('.pf-err');

  var urlRes = validateURL(rawUrl);
  if (!nameVal) { errEl.textContent='Name is required.'; return; }
  if (!urlRes.ok) { errEl.textContent=urlRes.msg; return; }

  var cats = [];
  card.querySelectorAll('.cat-check.checked input').forEach(function(inp){ cats.push(inp.value); });
  if (!cats.length) { errEl.textContent='Select at least one category.'; return; }

  var tags = tagsRaw.split(',').map(function(t){ return t.trim().replace(/^#/,'').toLowerCase(); }).filter(Boolean);

  // ── Duplicate URL check ──────────────────────────────────────
  var norm = urlRes.url.toLowerCase().replace(/\/$/, '');
  var dupe = (S.toolsData.tools || []).find(function(t){
    return (t.url || '').toLowerCase().replace(/\/$/, '') === norm;
  });
  if (dupe) {
    errEl.textContent = 'Duplicate: "' + dupe.name + '" already uses this URL. Edit the existing tool if needed.';
    return;
  }

  var btn = card.querySelector('.pf-approve');
  btn.disabled = true; btn.textContent = 'Saving…';
  errEl.textContent = '';

  // ── Store with multi-category support ───────────────────────
  // category  = primary (for backward compat)
  // categories = full array (used by app.js for multi-cat display)
  var toolEntry = {
    name: nameVal,
    description: desc,
    url: urlRes.url,
    category: cats[0],
    categories: cats.length > 1 ? cats : undefined,
    tags: tags
  };
  if (!toolEntry.categories) delete toolEntry.categories; // keep JSON clean if single cat

  var tools = S.toolsData;
  tools.tools.push(toolEntry);

  apiPut('tools.json', tools, S.toolsSha, 'Approve tool: '+nameVal)
    .then(function(res){
      S.toolsSha = res.content.sha;
      // Remove from pending
      return removePendingItem(item.id);
    })
    .then(function(){
      toast('✓ "'+nameVal+'" added to the site!', '✅');
      renderPending();
      renderTools();
    })
    .catch(function(e){
      btn.disabled=false; btn.textContent='✓ Approve';
      errEl.textContent='Error: '+e.message;
    });
}

function rejectPending(item, card) {
  var btn = card.querySelector('.pf-reject');
  btn.disabled=true; btn.textContent='Removing…';
  removePendingItem(item.id)
    .then(function(){ toast('Submission rejected.', '🗑️'); renderPending(); })
    .catch(function(e){ btn.disabled=false; btn.textContent='✗ Reject'; toast('Error: '+e.message,'❌'); });
}

function removePendingItem(id) {
  var data = S.pendingData || { pending:[] };
  data.pending = data.pending.filter(function(i){ return i.id !== id; });
  return apiPut('pending.json', data, S.pendingSha, 'Remove pending item: '+id)
    .then(function(res){ S.pendingSha = res.content.sha; S.pendingData = data; });
}

var toolsSearchQ = '';

function renderTools(q) {
  q = q || toolsSearchQ;
  toolsSearchQ = q;
  var loading = document.getElementById('tools-loading');
  var list = document.getElementById('tools-list');
  loading.classList.add('hidden');
  list.classList.remove('hidden');

  var tools = (S.toolsData && S.toolsData.tools) ? S.toolsData.tools : [];
  document.getElementById('tools-count').textContent = tools.length;

  var filtered = tools.filter(function(t){
    if (!q) return true;
    return (t.name+t.description+t.category+t.url).toLowerCase().includes(q.toLowerCase());
  });

  list.innerHTML = '';
  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div>No tools found</div></div>';
    return;
  }

  filtered.forEach(function(tool){
    var idx = S.toolsData.tools.indexOf(tool);
    var cat = S.toolsData.categories.find(function(c){ return c.id===tool.category; }) || {};
    var row = document.createElement('div');
    row.className = 'tool-row glass';
    row.innerHTML =
      '<div style="flex:1;min-width:0;">' +
        '<div class="tool-row-name">'+esc(tool.name)+'</div>' +
        '<div class="tool-row-meta">'+esc(cat.icon||'')+'&nbsp;'+esc(cat.short||cat.label||tool.category)+'&nbsp;·&nbsp;'+esc((tool.url||'').replace(/^https?:\/\//,'').split('/')[0])+'</div>' +
      '</div>' +
      '<div class="tool-row-badge">'+esc(tool.tags&&tool.tags.length?'#'+tool.tags.slice(0,2).join(' #'):'–')+'</div>' +
      '<button class="btn btn-ghost btn-sm" title="Edit">✎</button>' +
      '<button class="btn btn-danger btn-sm" title="Delete">🗑</button>';

    row.querySelector('[title=Edit]').addEventListener('click', function(e){
      e.stopPropagation(); openToolModal(idx);
    });
    row.querySelector('[title=Delete]').addEventListener('click', function(e){
      e.stopPropagation();
      if (!confirm('Delete "'+tool.name+'"?')) return;
      deleteTool(idx);
    });
    list.appendChild(row);
  });
}

function openToolModal(idx) {
  S.editToolIdx = idx;
  var isNew = idx === -1;
  document.getElementById('tool-modal-title').textContent = isNew ? 'Add New Tool' : 'Edit Tool';
  document.getElementById('tm-err').textContent = '';

  var tool = isNew ? { name:'', url:'', description:'', category:'', categories:[], tags:[] }
                   : S.toolsData.tools[idx];
  document.getElementById('tm-name').value = tool.name || '';
  document.getElementById('tm-url').value  = tool.url  || '';
  document.getElementById('tm-desc').value = tool.description || '';
  document.getElementById('tm-tags').value = (tool.tags||[]).join(', ');

  // Determine which categories are already selected
  var selectedCats = Array.isArray(tool.categories) && tool.categories.length
    ? tool.categories
    : (tool.category ? [tool.category] : []);

  var catsEl = document.getElementById('tm-cats');
  catsEl.innerHTML = '';
  var categories = S.toolsData.categories || [];
  categories.forEach(function(cat){
    var isChecked = selectedCats.indexOf(cat.id) !== -1;
    var lbl = document.createElement('label');
    lbl.className = 'cat-check' + (isChecked ? ' checked' : '');
    lbl.dataset.cid = cat.id;
    lbl.innerHTML = '<input type="checkbox" value="'+esc(cat.id)+'"'+(isChecked?' checked':'')+'/>'+
                    esc(cat.icon)+' '+esc(cat.short||cat.label);
    // MULTI-SELECT — toggle individual, allow many checked at once
    lbl.addEventListener('click', function(e){
      e.preventDefault();
      lbl.classList.toggle('checked');
      lbl.querySelector('input').checked = lbl.classList.contains('checked');
    });
    catsEl.appendChild(lbl);
  });

  document.getElementById('tool-modal').classList.remove('hidden');
}

function closeToolModal(){ document.getElementById('tool-modal').classList.add('hidden'); }

document.getElementById('tm-cancel').addEventListener('click', closeToolModal);
document.getElementById('tool-modal').addEventListener('click', function(e){
  if(e.target===this) closeToolModal();
});

document.getElementById('tm-save').addEventListener('click', function(){
  var nameVal = sanitize(document.getElementById('tm-name').value, 100);
  var rawUrl  = document.getElementById('tm-url').value;
  var desc    = sanitize(document.getElementById('tm-desc').value, 200);
  var tagsRaw = document.getElementById('tm-tags').value;
  var errEl   = document.getElementById('tm-err');

  var urlRes = validateURL(rawUrl);
  if (!nameVal){ errEl.textContent='Name required.'; return; }
  if (!urlRes.ok){ errEl.textContent=urlRes.msg; return; }

  // Collect ALL checked categories (multi-select)
  var cats = [];
  document.querySelectorAll('#tm-cats .cat-check.checked input').forEach(function(inp){ cats.push(inp.value); });
  if (!cats.length){ errEl.textContent='Select at least one category.'; return; }

  // Duplicate URL check (skip if editing the same tool)
  var norm = urlRes.url.toLowerCase().replace(/\/$/, '');
  var dupe = (S.toolsData.tools || []).find(function(t, i){
    if (S.editToolIdx !== -1 && i === S.editToolIdx) return false; // skip self
    return (t.url || '').toLowerCase().replace(/\/$/, '') === norm;
  });
  if (dupe) { errEl.textContent='Duplicate: "'+dupe.name+'" already uses this URL.'; return; }

  var tags = tagsRaw.split(',').map(function(t){ return t.trim().replace(/^#/,'').toLowerCase(); }).filter(Boolean);

  // Store category (primary) + categories (full array for multi-cat)
  var tool = {
    name: nameVal,
    description: desc,
    url: urlRes.url,
    category: cats[0],
    tags: tags
  };
  if (cats.length > 1) tool.categories = cats;

  var btn = document.getElementById('tm-save');
  btn.disabled=true; btn.textContent='Saving…'; errEl.textContent='';

  var tools = S.toolsData;
  var isNew = S.editToolIdx === -1;
  if (isNew) { tools.tools.push(tool); }
  else { tools.tools[S.editToolIdx] = tool; }

  apiPut('tools.json', tools, S.toolsSha, (isNew?'Add':'Edit')+' tool: '+nameVal)
    .then(function(res){
      S.toolsSha = res.content.sha;
      toast((isNew?'Added':'Updated')+' "'+nameVal+'"','✅');
      closeToolModal(); renderTools();
    })
    .catch(function(e){
      btn.disabled=false; btn.textContent='Save Tool';
      errEl.textContent='Error: '+e.message;
      if(isNew) tools.tools.pop();
    });
});

function deleteTool(idx) {
  var tool = S.toolsData.tools[idx];
  S.toolsData.tools.splice(idx,1);
  apiPut('tools.json', S.toolsData, S.toolsSha, 'Delete tool: '+(tool.name||''))
    .then(function(res){ S.toolsSha=res.content.sha; toast('Deleted "'+tool.name+'"','🗑️'); renderTools(); })
    .catch(function(e){ toast('Error: '+e.message,'❌'); S.toolsData.tools.splice(idx,0,tool); });
}

document.getElementById('cm-save').addEventListener('click', function(){
  var id    = sanitize(document.getElementById('cm-id').value,40).replace(/\s+/g,'-').toLowerCase();
  var label = sanitize(document.getElementById('cm-label').value,60);
  var short = sanitize(document.getElementById('cm-short').value,20);
  var icon  = sanitize(document.getElementById('cm-icon').value,4);
  var color = document.getElementById('cm-color').value;
  var errEl = document.getElementById('cm-err');

  if (!id)    { errEl.textContent='ID required.'; return; }
  if (!label) { errEl.textContent='Label required.'; return; }
  if (!/^#[0-9a-fA-F]{6}$/.test(color)) { errEl.textContent='Invalid colour (use #rrggbb).'; return; }

  // Check duplicate ID for new category
  if (editCatIdx===-1 && S.toolsData.categories.find(function(c){ return c.id===id; })) {
    errEl.textContent='ID "'+id+'" already exists.'; return;
  }

  var cat = { id:id, label:label, short:short||label, icon:icon||'📦', color:color };
  var btn = document.getElementById('cm-save');
  btn.disabled=true; btn.textContent='Saving…'; errEl.textContent='';

  var isNew = editCatIdx===-1;
  if (isNew) { S.toolsData.categories.push(cat); }
  else { S.toolsData.categories[editCatIdx] = Object.assign(S.toolsData.categories[editCatIdx], cat); }

  apiPut('tools.json', S.toolsData, S.toolsSha, (isNew?'Add':'Edit')+' category: '+label)
    .then(function(res){
      S.toolsSha=res.content.sha;
      toast((isNew?'Added':'Updated')+' category "'+label+'"','✅');
      closeCatModal(); renderCategories();
    })
    .catch(function(e){
      btn.disabled=false; btn.textContent='Save Category';
      errEl.textContent='Error: '+e.message;
      if(isNew) S.toolsData.categories.pop();
    });
});

function deleteCat(idx) {
  var cat = S.toolsData.categories[idx];
  S.toolsData.categories.splice(idx,1);
  apiPut('tools.json', S.toolsData, S.toolsSha, 'Delete category: '+cat.label)
    .then(function(res){ S.toolsSha=res.content.sha; toast('Deleted category','🗑️'); renderCategories(); })
    .catch(function(e){ toast('Error: '+e.message,'❌'); S.toolsData.categories.splice(idx,0,cat); });
}

document.getElementById('add-cat-btn').addEventListener('click', function(){ openCatModal(-1); });

// ═══════════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════════
document.querySelectorAll('.tab-btn').forEach(function(btn){
  btn.addEventListener('click', function(){
    document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
    document.querySelectorAll('.tab-content').forEach(function(c){ c.classList.remove('active'); });
    btn.classList.add('active');
    var tab = btn.getAttribute('data-tab');
    document.getElementById('tab-'+tab).classList.add('active');
    S.activeTab = tab;
  });
});

// ═══════════════════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════════════════
function doLogin() {
  if (checkLockout()) return;
  var pat = document.getElementById('pat-input').value.trim();
  var errEl = document.getElementById('login-err');
  var btn = document.getElementById('login-btn');

  if (!pat) { errEl.textContent='Password is required.'; return; }

  btn.disabled=true; btn.textContent='Verifying…'; errEl.textContent='';

  validateGHToken(pat)
    .then(function(ok){
      if (!ok) {
        recordFailedAttempt();
        errEl.textContent='Incorrect password. Please try again.';
        btn.disabled=false; btn.textContent='Sign In';
        return;
      }
      return getGHUser(pat).then(function(user){
        clearLoginState();
        startSession(pat, user ? user.login : 'admin');
        document.getElementById('login-screen').style.display='none';
        document.getElementById('admin-panel').style.display='flex';
        document.getElementById('gh-user').textContent = 'Signed in as @'+(user?user.login:'admin');
        return loadData();
      });
    })
    .catch(function(e){
      errEl.textContent='Error: '+e.message;
      btn.disabled=false; btn.textContent='Sign In';
    });
}

document.getElementById('login-btn').addEventListener('click', doLogin);
document.getElementById('pat-input').addEventListener('keydown', function(e){
  if (e.key==='Enter') doLogin();
});
// Strip any injected content from password field (defence-in-depth)
document.getElementById('pat-input').addEventListener('input', function(){
  this.value = this.value.replace(/[\x00-\x1F\x7F]/g,'').slice(0,500);
});

document.getElementById('logout-btn').addEventListener('click', function(){
  if (confirm('Sign out?')) logout();
});

document.getElementById('refresh-btn').addEventListener('click', function(){
  var btn = document.getElementById('refresh-btn');
  btn.disabled=true; btn.textContent='↻ Loading…';
  loadData().finally(function(){ btn.disabled=false; btn.textContent='↻ Refresh'; });
});

// ═══════════════════════════════════════════════════════
// INIT — restore session if tab still open
// ═══════════════════════════════════════════════════════
(function init(){
  checkLockout();
  var tok = sessionStorage.getItem('a_tok');
  var usr = sessionStorage.getItem('a_usr');
  if (tok) {
    S.token=tok; S.ghUser=usr||'admin';
    document.getElementById('login-screen').style.display='none';
    document.getElementById('admin-panel').style.display='flex';
    document.getElementById('gh-user').textContent='Signed in as @'+S.ghUser;
    resetIdleTimer();
    loadData();
  }
})();
</script>
